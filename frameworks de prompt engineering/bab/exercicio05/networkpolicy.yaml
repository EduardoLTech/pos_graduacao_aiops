apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: chronos-api-netpol
  namespace: production
  labels:
    app: chronos-api
spec:
  podSelector:
    matchLabels:
      app: chronos-api
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Restrict ingress to the application port (8080)
    - from:
        # Best practice: Allow ingress only from ingress controllers or API Gateway
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: controller # example label for ingress-nginx
      ports:
        - protocol: TCP
          port: 8080
  egress:
    # Allow DNS resolution to kube-dns
    - to:
        - namespaceSelector: {}
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Allow egress to external subnets (e.g., Database or external APIs)
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0 # In production, restrict this to the database/dependency subnet CIDR
