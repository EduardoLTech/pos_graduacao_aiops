# promptfooconfig.yaml — GATE de qualidade (LLM-as-judge) da Análise de causa-raiz
# Camada probabilística: onde o regex não alcança, um juiz LLM aplica a rubrica de 4
# critérios (0–2, corte >= 6, nenhum zerado) e reprova a RCA que não chega à causa.
# Roda a cada alteração do prompt.md — é este eval que o pipeline vai automatizar.
#
# Uso (na pasta do item, com as chaves exportadas):
#   export OPENROUTER_API_KEY="..."   # geração da RCA (gpt-4o-mini)
#   export GOOGLE_API_KEY="..."       # JUIZ (Gemini) — outra família, anti self-preference
#   promptfoo eval -c promptfooconfig.yaml --no-cache
#
# Papéis definidos na CALIBRAÇÃO: o gpt-4o-mini como juiz reprovou a RCA de referência
# (rebaixou C1/C2), então o juiz passou a ser o Gemini (juiz mais confiável para a
# rubrica) e a geração ficou com o gpt-4o-mini — mantendo geração e juiz em famílias
# distintas (anti self-preference). Ver a curadoria do checkpoint 09.
description: Gate de qualidade da RCA de causa-raiz — juiz LLM aplicando a rubrica de 4 critérios

prompts:
  - file://prompt.md

# Provider de GERAÇÃO: gpt-4o-mini via OpenRouter (família OpenAI). Saída ABERTA → o
# raciocínio importa; temperature baixa reduz variância entre rodadas.
providers:
  - id: openrouter:openai/gpt-4o-mini
    config:
      temperature: 0.2

defaultTest:
  vars:
    sistema: Cerebro — indexação e busca (serviço Java sobre Elasticsearch/JVM)
    janela: 08:00–10:00 UTC — buscas lentas e, em alguns casos, resultados parciais
    contexto_extra: >
      reindex noturno agendado 02:00 deveria terminar ~03:30; ainda em 41% às 10:00
  options:
    # Provider do JUIZ: google:gemini-2.5-flash — família Google, DIFERENTE da geração
    # (OpenAI). É assim que se mitiga o self-preference (juiz favorecer a própria
    # família). temperature 0 → juiz reprodutível. Julgar é raciocínio aberto, então o
    # thinking do juiz fica ligado (NÃO se aplica thinkingBudget: 0 aqui, ao contrário
    # dos itens estruturados do CP08).
    provider:
      id: google:gemini-2.5-flash
      config:
        temperature: 0
  assert:
    # ------- camada probabilística: o juiz é o gate -------
    - type: llm-rubric
      # rubricPrompt = a "anatomia do juiz" (role + rubrica + input + output + saída JSON).
      # O raciocínio vem antes do veredito de propósito (reasoning mais eficiente).
      rubricPrompt: file://rubrica-juiz.md
      # value = a rubrica que o juiz aplica ({{ rubric }} no rubricPrompt).
      value: |
        RUBRICA — Análise de causa-raiz (RCA). Quatro critérios, escala 0/1/2 cada
        (0 = não atende, 1 = parcial, 2 = atende), total de 0 a 8.

        C1. CAUSA-RAIZ CORRETA
          - 2: aponta a causa REAL — o reindex travado/prolongado saturando o heap
               compartilhado, levando a circuit breaker, timeouts de busca e queda do
               cache — e a expressa como ORIGEM da cadeia, não como sintoma.
          - 1: chega perto (cita heap/reindex) mas mistura com o sintoma, ou não fecha
               a cadeia gatilho→efeito.
          - 0: para no sintoma (ex.: "a busca está lenta", "falta heap" isolado) ou
               aponta causa errada.

        C2. CORRELAÇÃO × CAUSA
          - 2: separa explicitamente o que é CAUSA do que é CONSEQUÊNCIA (ex.: reconhece
               que a queda do cache hit e a latência de busca são EFEITO da pressão de
               heap, não a origem).
          - 1: separa em parte, mas trata pelo menos um efeito como se fosse causa.
          - 0: confunde correlação com causa (ex.: culpa o cache baixo ou a busca lenta
               como origem).

        C3. AÇÃO PROPORCIONAL
          - 2: ação coerente com o diagnóstico e dimensionada — mitigação imediata que
               ataca a ORIGEM (conter/pausar/reagendar o reindex, aliviar heap) + correção
               definitiva estrutural (timeout no reindex, isolar recursos escrita/leitura,
               rever heap/limites), sem sobre nem subdimensionar.
          - 1: ação plausível mas parcial, ou que maquia o sintoma (só subir timeout/heap
               sem tocar no reindex), ou sem separar imediata de definitiva.
          - 0: ação ausente, incoerente com o diagnóstico, ou que ignora a causa.

        C4. HONESTIDADE EPISTÊMICA
          - 2: reconhece o que os dados NÃO permitem concluir (ex.: falta o limite exato
               do circuit breaker no config; falta o breakdown de escrita por origem),
               avalia ao menos uma hipótese alternativa e declara o nível de confiança —
               em vez de fabricar certeza.
          - 1: reconhece incerteza de forma vaga, ou declara confiança sem apontar lacuna
               nem hipótese alternativa.
          - 0: fabrica certeza; inventa números/limites que não estão nos artefatos.

        REGRA DE DECISÃO (o gate):
          - APROVA (pass=true) somente se total >= 6 E NENHUM critério for 0.
          - REPROVA (pass=false) se total < 6 OU qualquer critério for 0 (um critério
            zerado derruba a RCA mesmo com total alto — é o peso crítico).
      metric: qualidade-do-juiz

# Uma entrada = o pacote de artefatos do incidente do Cerebro (config + métricas + logs).
# O gate roda o prompt.md contra ela, gera a RCA e a submete ao juiz.
tests:
  - description: Degradação do Cerebro — reindex travado saturando heap/circuit breaker
    vars:
      config: |
        # cerebro.yaml — configuração do cluster Elasticsearch (repositório de infra)
        cerebro:
          shards: 12
          replicas_per_shard: 1
          jvm_heap: 8g
          refresh_interval: 1s
          reindex_job:
            schedule: "0 2 * * *"     # roda todo dia às 02:00
            avg_duration_min: 90      # normalmente termina ~03:30
          query_cache:
            enabled: true
            size_mb: 512
