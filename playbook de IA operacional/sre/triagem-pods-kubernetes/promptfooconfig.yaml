# promptfooconfig.yaml — teste determinístico da Triagem de saúde de pods
# Roda o prompt.md desta pasta contra os 3 snapshots e verifica pod + causa por caso.
# Uso: (na raiz do repo, com as chaves exportadas)
#   promptfoo eval -c "sre/triagem-pods-kubernetes/promptfooconfig.yaml"
description: Triagem de pods — pod problemático + causa cruzada; reconhecer o caso saudável

prompts:
  - file://prompt.md

providers:
  # temperature 0.0 reduz variância — combina com a avaliação determinística
  - id: google:gemini-2.5-flash # provider 1
    config:
      temperature: 0.0
      generationConfig:
        thinkingConfig:
          thinkingBudget: 0   # desliga o raciocínio: cabe no teto de latência (5s) e custo
  # provider 2, outro fornecedor (gpt-4o-mini via OpenRouter) — exporte OPENROUTER_API_KEY
  - id: openrouter:openai/gpt-4o-mini
    config:
      temperature: 0.0

# Limites operacionais aplicados a toda saída; vars comuns dos parâmetros opcionais.
defaultTest:
  vars:
    namespace: sentinel-prod
    contexto_extra: nenhum
  assert:
    - type: latency
      threshold: 5000
    # custo <= US$ 0,01: usa o custo nativo quando o provider reporta (ex. Gemini);
    # calcula pelos tokens quando não reporta (ex. OpenRouter). gpt-4o-mini: in 0,15 / out 0,60 por 1M.
    - type: javascript
      value: |
        const resp = context.providerResponse || {};
        let cost = resp.cost;
        if (cost == null) {
          const u = resp.tokenUsage || {};
          cost = (u.prompt || 0) * 0.00000015 + (u.completion || 0) * 0.0000006;
        }
        return { pass: cost <= 0.01, score: 1, reason: 'custo estimado US$ ' + cost.toFixed(6) };

tests:
  # Entrada 1 — pod reiniciando (OOMKilled)
  - vars:
      snapshot: |
        $ kubectl get pods -n sentinel-prod
        NAME                            READY   STATUS             RESTARTS       AGE
        sentinel-api-7d9c8b6f4-2xk9p    1/1     Running            0              6d
        sentinel-api-7d9c8b6f4-h4m2t    0/1     CrashLoopBackOff   14 (90s ago)   42m
        sentinel-worker-5b8f9c8d-jq7rs  1/1     Running            0              6d
        sentinel-scheduler-6c4d7f-nn8vx 1/1     Running            0              6d
        $ kubectl describe pod sentinel-api-7d9c8b6f4-h4m2t -n sentinel-prod
            State:          Waiting
              Reason:       CrashLoopBackOff
            Last State:     Terminated
              Reason:       OOMKilled
              Exit Code:    137
            Limits:         memory: 512Mi
            Requests:       memory: 256Mi
        Events:
          Type     Reason   Age                 From     Message
          ----     ------   ----                ----     -------
          Warning  BackOff  2m (x18 over 40m)   kubelet  Back-off restarting failed container api
        $ kubectl logs sentinel-api-7d9c8b6f4-h4m2t -n sentinel-prod --previous
        2026-05-13 10:14:02 [INFO]  [api] startup complete, version 2.9.1
        2026-05-13 10:14:48 [INFO]  [cache] loading 6h alert cache (heap 410Mi/512Mi)
        2026-05-13 10:15:10 [WARN]  [runtime] high GC pressure, heap 498Mi/512Mi
        2026-05-13 10:15:12 [FATAL] [runtime] out of memory, shutting down process
    assert:
      # cita o pod problemático
      - type: contains
        value: sentinel-api-7d9c8b6f4-h4m2t
      # e chega à causa (OOMKilled ou memória), não só repete o STATUS
      - type: regex
        value: "OOMKilled|[Mm]em[óo]ria"

  # Entrada 2 — pods que não sobem (ImagePull + Pending por CPU)
  - vars:
      snapshot: |
        $ kubectl get pods -n sentinel-prod
        NAME                            READY   STATUS             RESTARTS   AGE
        sentinel-api-7d9c8b6f4-2xk9p    1/1     Running            0          6d
        sentinel-api-7d9c8b6f4-zzp10    0/1     ImagePullBackOff   0          8m
        sentinel-ingest-8f7a9c5b-4dkqm  0/1     Pending            0          8m
        sentinel-scheduler-6c4d7f-nn8vx 1/1     Running            0          6d
        $ kubectl describe pod sentinel-api-7d9c8b6f4-zzp10 -n sentinel-prod
            State:    Waiting
              Reason: ImagePullBackOff
            Image:    registry.aegis.io/sentinel-api:2.9.2
        Events:
          Type     Reason   Age   From     Message
          ----     ------   ----  ----     -------
          Warning  Failed   7m    kubelet  Failed to pull image "registry.aegis.io/sentinel-api:2.9.2": manifest unknown
          Warning  Failed   7m    kubelet  Error: ErrImagePull
          Normal   BackOff  6m    kubelet  Back-off pulling image "registry.aegis.io/sentinel-api:2.9.2"
        $ kubectl describe pod sentinel-ingest-8f7a9c5b-4dkqm -n sentinel-prod
            State:    Waiting
              Reason: Pending
            Requests: cpu: 2
        Events:
          Type     Reason            Age   From               Message
          ----     ------            ----  ----               -------
          Warning  FailedScheduling  7m    default-scheduler  0/6 nodes are available: 6 Insufficient cpu
    assert:
      # cita os dois pods problemáticos
      - type: contains
        value: sentinel-api-7d9c8b6f4-zzp10
      - type: contains
        value: sentinel-ingest-8f7a9c5b-4dkqm
      # causa do 1o: tag 2.9.2 inexistente / ImagePullBackOff
      - type: regex
        value: "2\\.9\\.2|ImagePullBackOff|manifest unknown"
      # causa do 2o: falta de CPU no scheduling
      - type: regex
        value: "[Ii]nsufficient|[Cc]pu"

  # Entrada 3 — tudo saudável (edge case: NÃO inventar problema)
  - vars:
      snapshot: |
        $ kubectl get pods -n sentinel-prod
        NAME                            READY   STATUS    RESTARTS     AGE
        sentinel-api-7d9c8b6f4-2xk9p    1/1     Running   0            6d
        sentinel-api-7d9c8b6f4-h4m2t    1/1     Running   0            6d
        sentinel-worker-5b8f9c8d-jq7rs  1/1     Running   1 (3d ago)   6d
        sentinel-scheduler-6c4d7f-nn8vx 1/1     Running   0            6d
        $ kubectl logs sentinel-api-7d9c8b6f4-2xk9p -n sentinel-prod --tail=3
        2026-05-13 11:02:31 [INFO] [api] health check OK, 0 errors in the last 5min
        2026-05-13 11:03:31 [INFO] [api] processed 4.2k alerts/min, p99 latency 120ms
        2026-05-13 11:04:31 [INFO] [api] health check OK
    assert:
      # indica que não há pod problemático E não classifica nenhum pod como em falha
      - type: javascript
        value: |
          const o = output.toLowerCase();
          const semFalha = !/🔴|crashloopbackoff|oomkilled|imagepullbackoff|failedscheduling/.test(o);
          const saudavel = /saud[aá]ve|nenhum pod problem|sem pods? problem|todos os pods|healthy|🟢/.test(o);
          return semFalha && saudavel;
